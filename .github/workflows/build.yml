name: Build WoWTranslate DLL

on:
  push:
    branches: [ main, master ]
    paths:
      - 'dll/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup CMake
      uses: lukka/get-cmake@latest

    - name: Configure CMake (32-bit)
      working-directory: dll
      run: |
        mkdir build
        cd build
        cmake .. -G "Visual Studio 17 2022" -A Win32

    - name: Build Release
      working-directory: dll/build
      run: cmake --build . --config Release

    - name: List build output
      working-directory: dll/build
      run: |
        echo "Build output:"
        Get-ChildItem -Path bin/Release -Recurse

    - name: Upload DLL artifact
      uses: actions/upload-artifact@v4
      with:
        name: WoWTranslate-DLL
        path: dll/build/bin/Release/WoWTranslate.dll
        if-no-files-found: error

    - name: Upload full addon package
      uses: actions/upload-artifact@v4
      with:
        name: WoWTranslate-Full
        path: |
          dll/build/bin/Release/WoWTranslate.dll
          Interface/AddOns/WoWTranslate/
        if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download DLL artifact
      uses: actions/download-artifact@v4
      with:
        name: WoWTranslate-DLL
        path: release/

    - name: Copy addon files and generate docs
      run: |
        mkdir -p release/WoWTranslate
        cp -r Interface/AddOns/WoWTranslate/* release/WoWTranslate/
        
        # 自动生成适配当前 WinINet 版本的免密安装说明
        cat << 'EOF' > release/INSTALL.txt
        WoWTranslate v0.14 安装说明
        =========================

        1. 将 WoWTranslate.dll 复制到你的魔兽客户端根目录下 (与 WoW.exe 在同一文件夹)。
        2. 打开或创建魔兽根目录下的 dlls.txt 文件，在里面添加一行: WoWTranslate.dll
        3. 将 WoWTranslate 文件夹复制到游戏目录的 Interface/AddOns/ 中。
        4. 启动游戏即可直接使用！当前版本基于 WinINet 重构，完全免费且不再需要任何 API 密钥。

        如需帮助，可在游戏内输入: /wt show
        EOF
        ls -la release/

    - name: Create release zip
      working-directory: release
      run: |
        zip -r WoWTranslate-v0.14.zip WoWTranslate.dll WoWTranslate/ INSTALL.txt

    - name: Upload release zip
      uses: actions/upload-artifact@v4
      with:
        name: WoWTranslate-Release
        path: release/WoWTranslate-v0.14.zip
